spring.application.name=anything

# JWT secret key for local development.
# Replace this value in application.properties.
jwt.secret=change-this-to-a-long-random-secret-key
jwt.expiration-ms=3600000

spring.datasource.url=jdbc:mysql://localhost:3306/anythingdb?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=change-me

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
